<!DOCTYPE html>
<html lang="zh-Hans" xml:lang="zh-Hans" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$if(title)$$title$$else$ECLab News$endif$</title>
$for(css)$
  <link rel="stylesheet" href="$css$" />
$endfor$
  <style>
:root {
  --accent: $if(accent-color)$$accent-color$$else$#8b3a3a$endif$;
}
  </style>
</head>
<body>

<div id="progress-bar"></div>

<header id="eclab-header">
  <div class="header-logo-wrap">
    <img class="header-logo-img" src="https://emotionculturelab.com/wp-content/uploads/2024/09/e59bbee789874.png" alt="ECLab Logo" onerror="this.style.display='none'" />
  </div>
  <h1>$if(title)$$title$$else$东西情报$endif$</h1>
  <p class="subtitle">浙江大学情绪和文化实验室 · Emotion &amp; Culture Lab, Zhejiang University</p>
</header>

<div id="page-wrapper">

$if(toc)$
<aside id="toc-sidebar">
  <div class="toc-title" id="toc-title">关键词 · Keywords</div>
  <div id="sidebar-controls">
    <div class="sidebar-pill-row" id="view-toggle">
      <button class="sidebar-pill active" data-view="keywords">关键词</button>
      <button class="sidebar-pill" data-view="journals">期刊</button>
    </div>
    <div class="sidebar-switch-row">
      <span class="switch-label">仅显示选中</span>
      <button type="button" class="switch" id="hide-switch" role="switch" aria-checked="false">
        <span class="switch-knob"></span>
      </button>
    </div>
  </div>
  <nav id="toc-nav">
  </nav>
</aside>
<div id="toc-overlay"></div>
$endif$

<main id="content">
$body$
</main>

</div>

$if(toc)$
<button id="toc-toggle" aria-label="Toggle table of contents">☰</button>
$endif$

<footer id="eclab-footer">
  <div class="footer-inner">
    <img class="footer-logo" src="https://emotionculturelab.com/wp-content/uploads/2024/09/e59bbee789871.png" alt="ECLab" onerror="this.style.display='none'" />
    <div class="footer-text">
      <p class="footer-name">浙江大学情绪和文化实验室</p>
      <p class="footer-links"><a href="https://emotionculturelab.wordpress.com">emotionculturelab.wordpress.com</a></p>
    </div>
  </div>
</footer>

<img id="logo-watermark" src="https://emotionculturelab.com/wp-content/uploads/2024/09/e59bbee789871.png" alt="" aria-hidden="true" onerror="this.style.display='none'" />

<script>
(function() {
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Progress bar
  var pb = document.getElementById('progress-bar');
  if (pb) {
    window.addEventListener('scroll', function() {
      var h = document.documentElement.scrollHeight - window.innerHeight;
      pb.style.width = (h > 0 ? window.scrollY / h * 100 : 0) + '%';
    }, { passive: true });
  }

  var tocTitle   = document.getElementById('toc-title');
  var nav        = document.getElementById('toc-nav');
  var viewPills  = document.querySelectorAll('#view-toggle .sidebar-pill');
  var hideSwitch = document.getElementById('hide-switch');

  var keywordSections = document.querySelectorAll('.index-section[data-view="keywords"]');
  var journalSections = document.querySelectorAll('.index-section[data-view="journals"]');

  var currentView     = 'keywords';
  var currentCategory = null;
  var hideMode        = false;

  var DETAILS_KEY = '文献详情';

  // Sliding indicator element (single moving highlight — no cascade)
  var indicator = document.createElement('div');
  indicator.className = 'toc-indicator';
  var ul = null;            // current <ul> of links
  var linkByKey = {};       // key -> <a>

  // ── helpers ────────────────────────────────────────────────────────────────

  function attr() { return currentView === 'keywords' ? 'data-category' : 'data-journal'; }

  function activeSections() {
    return currentView === 'keywords' ? keywordSections : journalSections;
  }

  function show(el) { el.style.display = ''; }
  function hide(el) { el.style.display = 'none'; }

  // Show/hide every category-section inside the active view
  function applyFilter() {
    var filterCat = currentCategory === DETAILS_KEY ? null : currentCategory;
    activeSections().forEach(function(view) {
      view.querySelectorAll('.category-section').forEach(function(s) {
        var key = s.getAttribute(attr());
        var shouldShow = !hideMode || !filterCat || key === filterCat;
        var wasHidden = s.style.display === 'none';
        if (shouldShow) {
          show(s);
          if (wasHidden && !reduceMotion) {
            s.classList.remove('fade-in');
            void s.offsetWidth;
            s.classList.add('fade-in');
          }
        } else {
          hide(s);
          s.classList.remove('fade-in');
        }
      });
    });
  }

  // ── sliding indicator ─────────────────────────────────────────────────────

  function moveIndicator(key, animate) {
    var link = key ? linkByKey[key] : null;
    if (!link || !ul) {
      indicator.style.opacity = '0';
      return;
    }
    var li = link.parentElement;
    if (!animate || reduceMotion) indicator.classList.add('no-anim');
    indicator.style.opacity = '1';
    indicator.style.transform = 'translateY(' + li.offsetTop + 'px)';
    indicator.style.height = li.offsetHeight + 'px';
    if (!animate || reduceMotion) {
      // force reflow then re-enable transition
      void indicator.offsetWidth;
      indicator.classList.remove('no-anim');
    }
  }

  function setActive(key, animateIndicator) {
    currentCategory = key;
    nav.querySelectorAll('a[data-filter]').forEach(function(a) {
      var on = a.getAttribute('data-filter') === key;
      a.classList.toggle('active', on);
      if (on) a.setAttribute('aria-current', 'location');
      else a.removeAttribute('aria-current');
    });
    moveIndicator(key, animateIndicator !== false);
  }

  // ── programmatic scroll handling ────────────────────────────────────────────

  var programmatic = false;
  var settleTimer = null;

  function scrollToKey(key) {
    var target = null;
    if (key === DETAILS_KEY) {
      target = document.getElementById('文献详情');
    } else {
      var selector = '.category-section[' + attr() + '="' + CSS.escape(key) + '"]';
      activeSections().forEach(function(view) {
        if (!target) target = view.querySelector(selector);
      });
    }
    if (!target) return;

    if (reduceMotion) {
      target.scrollIntoView({ block: 'start' });
      return;
    }

    programmatic = true;
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Clear programmatic flag when scrolling settles
    var clear = function() {
      programmatic = false;
      window.removeEventListener('scrollend', clear);
    };
    if ('onscrollend' in window) {
      window.addEventListener('scrollend', clear, { once: true });
    }
    // Fallback: settle timeout reset on each scroll tick
    function onScrollSettle() {
      if (settleTimer) clearTimeout(settleTimer);
      settleTimer = setTimeout(function() {
        programmatic = false;
        window.removeEventListener('scroll', onScrollSettle);
      }, 140);
    }
    window.addEventListener('scroll', onScrollSettle, { passive: true });
  }

  // Cancel programmatic suppression the moment the user takes over
  ['wheel', 'touchstart', 'keydown'].forEach(function(evt) {
    window.addEventListener(evt, function() { programmatic = false; }, { passive: true });
  });

  // ── sidebar build ───────────────────────────────────────────────────────────

  function buildSidebar() {
    nav.innerHTML = '';
    linkByKey = {};
    ul = document.createElement('ul');
    ul.appendChild(indicator);

    var seen = [];
    activeSections().forEach(function(view) {
      view.querySelectorAll('.category-section[' + attr() + ']').forEach(function(s) {
        var v = s.getAttribute(attr());
        if (v && seen.indexOf(v) === -1) seen.push(v);
      });
    });
    seen.sort(function(a, b) { return a.toLowerCase().localeCompare(b.toLowerCase()); });

    // 文献详情 is a normal tag, appended last
    seen.push(DETAILS_KEY);

    seen.forEach(function(cat) {
      var li = document.createElement('li');
      var a  = document.createElement('a');
      a.href = '#';
      a.textContent = cat;
      a.setAttribute('data-filter', cat);
      a.addEventListener('click', function(e) {
        e.preventDefault();
        onTagClick(cat);
      });
      li.appendChild(a);
      ul.appendChild(li);
      linkByKey[cat] = a;
    });

    nav.appendChild(ul);
    // Position indicator without animation on (re)build
    requestAnimationFrame(function() { moveIndicator(currentCategory, false); });
  }

  // ── interactions ────────────────────────────────────────────────────────────

  function onTagClick(cat) {
    if (hideMode && cat === currentCategory && cat !== DETAILS_KEY) {
      // Toggle off — show all
      setActive(null);
      applyFilter();
      return;
    }
    setActive(cat);
    if (cat !== DETAILS_KEY) applyFilter();
    scrollToKey(cat);
  }

  // View toggle
  viewPills.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var view = this.getAttribute('data-view');
      if (view === currentView) return;
      viewPills.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');

      keywordSections.forEach(hide);
      journalSections.forEach(hide);

      currentView     = view;
      currentCategory = null;
      hideMode        = false;
      if (hideSwitch) { hideSwitch.classList.remove('on'); hideSwitch.setAttribute('aria-checked', 'false'); }
      if (tocTitle) tocTitle.textContent = view === 'keywords' ? '关键词 · Keywords' : '期刊 · Journals';

      activeSections().forEach(function(s) {
        show(s);
        s.querySelectorAll('.category-section').forEach(show);
      });

      buildSidebar();
      requestAnimationFrame(spy);
    });
  });

  // Hide-mode switch
  if (hideSwitch) {
    hideSwitch.addEventListener('click', function() {
      hideMode = !hideMode;
      this.classList.toggle('on', hideMode);
      this.setAttribute('aria-checked', hideMode ? 'true' : 'false');
      if (!hideMode) { setActive(null); }
      applyFilter();
      if (hideMode && currentCategory) moveIndicator(currentCategory, false);
    });
  }

  // ── scroll-spy (suppressed during programmatic scroll) ──────────────────────

  function spy() {
    if (programmatic || hideMode || !nav) return;
    var line = 90; // active reference line from top of viewport
    var a = attr();
    var current = null;
    activeSections().forEach(function(view) {
      view.querySelectorAll('.category-section[' + a + ']').forEach(function(s) {
        if (s.style.display !== 'none' && s.getBoundingClientRect().top <= line) {
          current = s.getAttribute(a);
        }
      });
    });
    // Details section
    var details = document.getElementById('文献详情');
    if (details && details.getBoundingClientRect().top <= line) current = DETAILS_KEY;
    // Bottom of page → force last tag
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2) {
      current = DETAILS_KEY;
    }
    if (current !== currentCategory) setActive(current);
  }
  window.addEventListener('scroll', spy, { passive: true });

  // Reposition indicator on resize / layout shifts
  if (window.ResizeObserver) {
    var ro = new ResizeObserver(function() { moveIndicator(currentCategory, false); });
    ro.observe(nav);
  }
  window.addEventListener('resize', function() { moveIndicator(currentCategory, false); });

  // ── init ────────────────────────────────────────────────────────────────────

  buildSidebar();
  requestAnimationFrame(spy);

  // Wrap article detail cards
  document.querySelectorAll('a[id^="article-"]').forEach(function(anchor) {
    var p = anchor.parentElement;
    if (!p || p.tagName !== 'P') return;
    var card = document.createElement('div');
    card.className = 'article-card';
    card.id = anchor.id;
    anchor.id = '';
    p.parentNode.insertBefore(card, p);
    p.remove();
    var sibling = card.nextSibling;
    while (sibling) {
      var next = sibling.nextSibling;
      if (sibling.nodeType === 1 && (
        (sibling.tagName === 'P' && sibling.querySelector('a[id^="article-"]')) ||
        sibling.tagName === 'H2'
      )) break;
      card.appendChild(sibling);
      sibling = next;
    }
    var ps = card.querySelectorAll('p');
    if (ps.length > 0) ps[ps.length - 1].classList.add('abstract');
  });

  // Mobile sidebar toggle
  var toggle  = document.getElementById('toc-toggle');
  var sidebar = document.getElementById('toc-sidebar');
  var overlay = document.getElementById('toc-overlay');
  if (toggle && sidebar) {
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      if (overlay) overlay.classList.toggle('open');
    });
    if (overlay) overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      if (overlay) overlay.classList.remove('open');
    });
  }
})();
</script>

</body>
</html>
