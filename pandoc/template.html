<!DOCTYPE html>
<html lang="zh-Hans" xml:lang="zh-Hans" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$if(title)$$title$$else$ECLab News$endif$</title>
$for(css)$
  <link rel="stylesheet" href="$css$" />
$endfor$
  <style>
:root {
  --accent: $if(accent-color)$$accent-color$$else$#8b3a3a$endif$;
}
  </style>
</head>
<body>

<div id="progress-bar"></div>

<header id="eclab-header">
  <div class="header-logo-wrap">
    <img class="header-logo-img" src="https://emotionculturelab.com/wp-content/uploads/2024/09/e59bbee789874.png" alt="ECLab Logo" onerror="this.style.display='none'" />
  </div>
  <h1>$if(title)$$title$$else$东西情报$endif$</h1>
  <p class="subtitle">浙江大学情绪和文化实验室 · Emotion &amp; Culture Lab, Zhejiang University</p>
</header>

<div id="page-wrapper">

$if(toc)$
<aside id="toc-sidebar">
  <div class="toc-title" id="toc-title">关键词 · Keywords</div>
  <div id="sidebar-controls">
    <div class="sidebar-pill-row" id="view-toggle">
      <div class="pill-thumb" id="view-pill-thumb"></div>
      <button class="sidebar-pill active" data-view="keywords">关键词</button>
      <button class="sidebar-pill" data-view="journals">期刊</button>
    </div>
    <div class="sidebar-pill-row" id="hide-toggle">
      <div class="pill-thumb" id="hide-pill-thumb"></div>
      <button class="sidebar-pill active" data-hide="false">全部显示</button>
      <button class="sidebar-pill" data-hide="true">仅显示选中</button>
    </div>
  </div>
  <nav id="toc-nav">
  </nav>
</aside>
<div id="toc-overlay"></div>
$endif$

<main id="content">
$body$
</main>

</div>

$if(toc)$
<button id="toc-toggle" aria-label="Toggle table of contents">☰</button>
$endif$

<footer id="eclab-footer">
  <div class="footer-inner">
    <img class="footer-logo" src="https://emotionculturelab.com/wp-content/uploads/2024/09/e59bbee789871.png" alt="ECLab" onerror="this.style.display='none'" />
    <div class="footer-text">
      <p class="footer-name">浙江大学情绪和文化实验室</p>
      <p class="footer-links"><a href="https://emotionculturelab.wordpress.com">emotionculturelab.wordpress.com</a></p>
    </div>
  </div>
</footer>

<img id="logo-watermark" src="https://emotionculturelab.com/wp-content/uploads/2024/09/e59bbee789871.png" alt="" aria-hidden="true" onerror="this.style.display='none'" />

<script>
(function() {
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Progress bar
  var pb = document.getElementById('progress-bar');
  if (pb) {
    window.addEventListener('scroll', function() {
      var h = document.documentElement.scrollHeight - window.innerHeight;
      pb.style.width = (h > 0 ? window.scrollY / h * 100 : 0) + '%';
    }, { passive: true });
  }

  var tocTitle    = document.getElementById('toc-title');
  var nav         = document.getElementById('toc-nav');
  var viewToggle  = document.getElementById('view-toggle');
  var hideToggle  = document.getElementById('hide-toggle');
  var viewPillThumb = document.getElementById('view-pill-thumb');
  var hidePillThumb = document.getElementById('hide-pill-thumb');
  var viewPills   = document.querySelectorAll('#view-toggle .sidebar-pill');
  var hidePills   = document.querySelectorAll('#hide-toggle .sidebar-pill');

  var keywordSections = document.querySelectorAll('.index-section[data-view="keywords"]');
  var journalSections = document.querySelectorAll('.index-section[data-view="journals"]');

  var currentView     = 'keywords';
  var currentCategory = null;
  var hideMode        = false;
  var DETAILS_KEY     = '文献详情';
  var REC_KEY         = '⭐ 推荐阅读';

  // ── pill thumb animation ────────────────────────────────────────────────────
  // Move the sliding thumb to the position of the active button

  function movePillThumb(thumb, activeBtn, row) {
    if (!thumb || !activeBtn) return;
    var rowRect = row.getBoundingClientRect();
    var btnRect = activeBtn.getBoundingClientRect();
    var x = btnRect.left - rowRect.left - 3; // 3 = padding
    thumb.style.width  = btnRect.width + 'px';
    thumb.style.transform = 'translateX(' + x + 'px)';
  }

  function initPillThumb(thumb, row, activeBtn) {
    if (!thumb || !activeBtn) return;
    thumb.classList.add('no-spring');
    movePillThumb(thumb, activeBtn, row);
    void thumb.offsetWidth;
    thumb.classList.remove('no-spring');
  }

  // ── index panel fade ────────────────────────────────────────────────────────

  function fadeSection(el, show) {
    el.classList.remove('panel-fade-in', 'panel-fade-out');
    if (show) {
      el.style.display = '';
      el.classList.add('panel-fade-in');
    } else {
      el.classList.add('panel-fade-out');
      var duration = reduceMotion ? 0 : 200;
      setTimeout(function() { el.style.display = 'none'; el.classList.remove('panel-fade-out'); }, duration);
    }
  }

  // ── sidebar nav carousel ────────────────────────────────────────────────────
  // Two <ul> tracks side-by-side inside a .nav-track; translate to reveal correct one.

  var navTrack = null;
  var kwUl = null;  // keywords ul
  var jnUl = null;  // journals ul
  var indicator = document.createElement('div');
  indicator.className = 'toc-indicator';
  var linkByKey = {};

  function buildNavTrack() {
    nav.innerHTML = '';
    linkByKey = {};

    navTrack = document.createElement('div');
    navTrack.className = 'nav-track';

    kwUl = buildNavList('keywords');
    jnUl = buildNavList('journals');
    navTrack.appendChild(kwUl);
    navTrack.appendChild(jnUl);

    // Indicator lives on whichever ul is active
    activeNavUl().appendChild(indicator);

    nav.appendChild(navTrack);

    // Slide to correct position immediately (no animation)
    navTrack.classList.add('no-spring');
    updateNavTrackPosition();
    void navTrack.offsetWidth;
    navTrack.classList.remove('no-spring');

    requestAnimationFrame(function() { moveIndicator(currentCategory, false); });
  }

  function buildNavList(view) {
    var ul = document.createElement('ul');
    ul.setAttribute('data-nav-view', view);
    var a = view === 'keywords' ? 'data-category' : 'data-journal';
    var viewSections = view === 'keywords' ? keywordSections : journalSections;

    var seen = [];
    viewSections.forEach(function(s) {
      s.querySelectorAll('.category-section[' + a + ']').forEach(function(cs) {
        var v = cs.getAttribute(a);
        if (v && seen.indexOf(v) === -1) seen.push(v);
      });
    });
    seen.sort(function(a, b) {
      // Recommended always sorts first
      if (a === REC_KEY) return -1;
      if (b === REC_KEY) return 1;
      return a.toLowerCase().localeCompare(b.toLowerCase());
    });
    // Details last
    seen.push(DETAILS_KEY);

    seen.forEach(function(cat) {
      var li = document.createElement('li');
      var link = document.createElement('a');
      link.href = '#';
      link.textContent = cat;
      link.setAttribute('data-filter', cat);
      link.addEventListener('click', function(e) {
        e.preventDefault();
        onNavClick(cat);
      });
      li.appendChild(link);
      ul.appendChild(li);
      if (view === currentView) linkByKey[cat] = link;
    });

    return ul;
  }

  function activeNavUl() {
    return currentView === 'keywords' ? kwUl : jnUl;
  }

  function updateNavTrackPosition() {
    if (!navTrack) return;
    navTrack.style.transform = currentView === 'keywords' ? 'translateX(0)' : 'translateX(-50%)';
  }

  function syncLinkByKey() {
    // Rebuild linkByKey from the active ul
    linkByKey = {};
    var ul = activeNavUl();
    if (!ul) return;
    ul.querySelectorAll('a[data-filter]').forEach(function(a) {
      linkByKey[a.getAttribute('data-filter')] = a;
    });
    // Move indicator to the active ul
    activeNavUl().appendChild(indicator);
  }

  // ── sliding indicator ─────────────────────────────────────────────────────

  function moveIndicator(key, animate) {
    var link = key ? linkByKey[key] : null;
    if (!link) { indicator.style.opacity = '0'; return; }
    var li = link.parentElement;
    if (!animate || reduceMotion) indicator.classList.add('no-anim');
    indicator.style.opacity = '1';
    indicator.style.transform = 'translateY(' + li.offsetTop + 'px)';
    indicator.style.height = li.offsetHeight + 'px';
    if (!animate || reduceMotion) { void indicator.offsetWidth; indicator.classList.remove('no-anim'); }
  }

  function setActive(key, animate) {
    currentCategory = key;
    // Update links in both nav lists
    [kwUl, jnUl].forEach(function(ul) {
      if (!ul) return;
      ul.querySelectorAll('a[data-filter]').forEach(function(a) {
        var on = a.getAttribute('data-filter') === key;
        a.classList.toggle('active', on);
        if (on) a.setAttribute('aria-current', 'location'); else a.removeAttribute('aria-current');
      });
    });
    moveIndicator(key, animate !== false);
  }

  // ── filter ──────────────────────────────────────────────────────────────────

  function applyFilter() {
    var filterCat = (currentCategory === DETAILS_KEY) ? null : currentCategory;
    activeSections().forEach(function(view) {
      view.querySelectorAll('.category-section').forEach(function(s) {
        var key = s.getAttribute(attr());
        var shouldShow = !hideMode || !filterCat || key === filterCat;
        var wasHidden = s.style.display === 'none';
        if (shouldShow) {
          s.style.display = '';
          if (wasHidden && !reduceMotion) {
            s.classList.remove('fade-in'); void s.offsetWidth; s.classList.add('fade-in');
          }
        } else { s.style.display = 'none'; s.classList.remove('fade-in'); }
      });
    });
  }

  // ── helpers ──────────────────────────────────────────────────────────────────

  function attr() { return currentView === 'keywords' ? 'data-category' : 'data-journal'; }
  function activeSections() { return currentView === 'keywords' ? keywordSections : journalSections; }

  // ── programmatic scroll ────────────────────────────────────────────────────

  var programmatic = false;
  var settleTimer = null;

  function scrollToTarget(el) {
    if (!el) return;
    if (reduceMotion) { el.scrollIntoView({ block: 'start' }); return; }
    programmatic = true;
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if ('onscrollend' in window) {
      window.addEventListener('scrollend', function() { programmatic = false; }, { once: true });
    }
    function onSettle() {
      if (settleTimer) clearTimeout(settleTimer);
      settleTimer = setTimeout(function() { programmatic = false; window.removeEventListener('scroll', onSettle); }, 140);
    }
    window.addEventListener('scroll', onSettle, { passive: true });
  }

  function scrollToKey(key) {
    if (key === DETAILS_KEY) { scrollToTarget(document.getElementById('文献详情')); return; }
    var selector = '.category-section[' + attr() + '="' + CSS.escape(key) + '"]';
    var found = null;
    activeSections().forEach(function(v) { if (!found) found = v.querySelector(selector); });
    scrollToTarget(found);
  }

  ['wheel', 'touchstart', 'keydown'].forEach(function(e) {
    window.addEventListener(e, function() { programmatic = false; }, { passive: true });
  });

  // ── interactions ────────────────────────────────────────────────────────────

  function onNavClick(cat) {
    if (hideMode && cat === currentCategory && cat !== DETAILS_KEY) {
      setActive(null); applyFilter(); return;
    }
    setActive(cat);
    if (cat !== DETAILS_KEY) applyFilter();
    scrollToKey(cat);
  }

  function switchView(view, onComplete) {
    if (view === currentView) { if (onComplete) onComplete(); return; }
    var oldSections = activeSections();

    currentView = view;
    var newSections = activeSections();

    // Fade panels
    oldSections.forEach(function(s) { fadeSection(s, false); });
    newSections.forEach(function(s) {
      fadeSection(s, true);
      // Reset any category-sections hidden by a previous filter in this view
      s.querySelectorAll('.category-section').forEach(function(cs) { cs.style.display = ''; });
      s.querySelectorAll('.article-index-item').forEach(function(it) { it.style.display = ''; });
    });

    // Slide nav track
    updateNavTrackPosition();
    // Sync linkByKey to the new active ul
    syncLinkByKey();

    currentCategory = null;
    hideMode = false;
    // Reset hide pill thumb
    var firstHideBtn = hidePills[0];
    hidePills.forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-hide') === 'false'); });
    if (firstHideBtn) movePillThumb(hidePillThumb, firstHideBtn, hideToggle);

    if (tocTitle) tocTitle.textContent = view === 'keywords' ? '关键词 · Keywords' : '期刊 · Journals';

    setActive(null, false);

    // Wait for the fade-out to remove old sections from layout before
    // running scroll-dependent callbacks, so positions are stable.
    var delay = reduceMotion ? 0 : 210;
    setTimeout(function() {
      if (onComplete) onComplete();
      requestAnimationFrame(spy);
    }, delay);
  }

  // View toggle
  viewPills.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var view = this.getAttribute('data-view');
      if (view === currentView) return;
      viewPills.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      movePillThumb(viewPillThumb, this, viewToggle);
      switchView(view);
    });
  });

  // Hide-mode toggle
  hidePills.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var wantHide = this.getAttribute('data-hide') === 'true';
      if (wantHide === hideMode) return;
      hidePills.forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      movePillThumb(hidePillThumb, this, hideToggle);
      hideMode = wantHide;
      if (!hideMode) setActive(null);
      applyFilter();
    });
  });

  // ── scroll-spy ─────────────────────────────────────────────────────────────

  function spy() {
    if (programmatic || hideMode || !nav) return;
    var line = 90;
    var a = attr();
    var current = null;
    activeSections().forEach(function(view) {
      view.querySelectorAll('.category-section[' + a + ']').forEach(function(s) {
        if (s.style.display !== 'none' && s.getBoundingClientRect().top <= line) current = s.getAttribute(a);
      });
    });
    var details = document.getElementById('文献详情');
    if (details && details.getBoundingClientRect().top <= line) current = DETAILS_KEY;
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2) current = DETAILS_KEY;
    if (current !== currentCategory) setActive(current);
  }
  window.addEventListener('scroll', spy, { passive: true });

  // ── clickable tags in article index ────────────────────────────────────────

  document.querySelectorAll('.tag[data-tag]').forEach(function(tag) {
    tag.addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      var tagValue = this.getAttribute('data-tag');
      var isRec = this.classList.contains('tag-rec');
      var isJournal = this.classList.contains('tag-journal');
      // Recommended is cross-view → stay in current view; otherwise pick view by tag type
      var targetView = isRec ? currentView : (isJournal ? 'journals' : 'keywords');

      function activateAndScroll() {
        setActive(tagValue);
        if (hideMode) applyFilter();
        scrollToKey(tagValue);
      }

      if (targetView !== currentView) {
        // Move the view pill, then switch; scroll only after layout settles
        viewPills.forEach(function(x) { x.classList.remove('active'); });
        viewPills.forEach(function(b) {
          if (b.getAttribute('data-view') === targetView) {
            b.classList.add('active');
            movePillThumb(viewPillThumb, b, viewToggle);
          }
        });
        switchView(targetView, activateAndScroll);
      } else {
        activateAndScroll();
      }
    });
  });

  // ── ResizeObserver ──────────────────────────────────────────────────────────

  if (window.ResizeObserver) {
    new ResizeObserver(function() { moveIndicator(currentCategory, false); }).observe(nav);
  }
  window.addEventListener('resize', function() {
    moveIndicator(currentCategory, false);
    // Reposition pill thumbs
    var activeView = Array.from(viewPills).find(function(b) { return b.classList.contains('active'); });
    if (activeView) { viewPillThumb.classList.add('no-spring'); movePillThumb(viewPillThumb, activeView, viewToggle); void viewPillThumb.offsetWidth; viewPillThumb.classList.remove('no-spring'); }
    var activeHide = Array.from(hidePills).find(function(b) { return b.classList.contains('active'); });
    if (activeHide) { hidePillThumb.classList.add('no-spring'); movePillThumb(hidePillThumb, activeHide, hideToggle); void hidePillThumb.offsetWidth; hidePillThumb.classList.remove('no-spring'); }
  });

  // ── init ────────────────────────────────────────────────────────────────────

  buildNavTrack();
  requestAnimationFrame(spy);

  // Initialize pill thumbs without animation
  requestAnimationFrame(function() {
    var av = Array.from(viewPills).find(function(b) { return b.classList.contains('active'); });
    initPillThumb(viewPillThumb, viewToggle, av);
    var ah = Array.from(hidePills).find(function(b) { return b.classList.contains('active'); });
    initPillThumb(hidePillThumb, hideToggle, ah);
  });

  // Wrap article detail cards
  document.querySelectorAll('a[id^="article-"]').forEach(function(anchor) {
    var p = anchor.parentElement;
    if (!p || p.tagName !== 'P') return;
    var card = document.createElement('div');
    card.className = 'article-card'; card.id = anchor.id; anchor.id = '';
    p.parentNode.insertBefore(card, p); p.remove();
    var sibling = card.nextSibling;
    while (sibling) {
      var next = sibling.nextSibling;
      if (sibling.nodeType === 1 && (
        (sibling.tagName === 'P' && sibling.querySelector('a[id^="article-"]')) ||
        sibling.tagName === 'H2'
      )) break;
      card.appendChild(sibling); sibling = next;
    }
    var ps = card.querySelectorAll('p');
    if (ps.length > 0) ps[ps.length - 1].classList.add('abstract');
  });

  // Mobile sidebar toggle
  var toggle = document.getElementById('toc-toggle');
  var sidebar = document.getElementById('toc-sidebar');
  var overlay = document.getElementById('toc-overlay');
  if (toggle && sidebar) {
    toggle.addEventListener('click', function() { sidebar.classList.toggle('open'); if (overlay) overlay.classList.toggle('open'); });
    if (overlay) overlay.addEventListener('click', function() { sidebar.classList.remove('open'); overlay.classList.remove('open'); });
  }
})();
</script>

</body>
</html>
