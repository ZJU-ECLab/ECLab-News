# Optional broad labels used by the Markdown report. Matching is based on
# collected keywords and title/abstract text.
[categories]
Emotion = ["emotion", "emotional", "emotion regulation"]
"Facial Expression" = ["facial expression", "facial expressions", "face expression"]
"Vocal Expression" = ["vocal expression", "vocal expressions", "prosody", "speech expression"]
Affect = ["affect", "affective", "valence", "arousal"]
"Culture" = ["cross-cultural", "cross culture", "culture", "cultural"]
"Emotion Perception" = ["emotion perception", "emotion recognition", "perceive emotion"]
"Emotion Expression" = ["emotion expression", "emotional expression", "express emotion"]
"Emotion Experience" = ["emotion experience", "emotional experience", "experienced emotion"]
Face = ["face", "faces", "facial"]
Voice = ["voice", "vocal", "speech", "prosody"]
Feeling = ["feeling", "feelings"]
Mood = ["mood", "moods"]
