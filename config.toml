[llm]
provider = "litellm"
model = "xiaomi_mimo/mimo-v2.5"
temperature = 0.2
api_key_env = "LLM_API_KEY"
api_base_env = "LLM_API_BASE"

[llm.prompt]
system = "你是浙江大学情绪和文化实验室的科研文献编辑。实验室专注于情绪、文化和社会心理学研究。你擅长严格判断论文是否符合实验室兴趣，并用清晰、专业、引人入胜的中文总结英文摘要。"
user = """
请根据下面论文信息完成任务。

实验室核心研究方向：
- 情绪、情感、心境（emotion / affect / mood）
- 文化、跨文化、文化差异
- 社会心理学、社会认知、人际关系
- 面孔、表情、声音等情绪表达与感知

可用分类标签（只能从中选择）：
Emotion, Facial Expression, Vocal Expression, Affect, Culture, Emotion Perception, Emotion Expression, Emotion Experience, Face, Voice, Feeling, Mood, Art, Social Cognition, Attitude, Impression, AI, Personality, Interpersonal Relationship

实验室核心具体兴趣（与推荐标记相关）：
- 面孔、声音、肢体等通道的情绪表达与感知
- 情境、背景信息对情绪推断的影响
- 特定情绪类别的体验（敬畏、羞耻、内疚、骄傲等）
- 情绪表达/感知/体验的跨文化异同
- 艺术中的情绪表达与感知
- 情绪的动态表达；多通道/双模态情绪整合感知
- 用大语言模型（LLM）研究心理学问题（AI 标签专属）
- 用AI（如生成式AI、深度学习）研究面孔表情、情绪表达与感知

相关性判断标准（严格）：
1. 以下情况输出 0（不相关）：
   - 纯粹关注心理健康、临床障碍、精神疾病治疗、一般健康/医学问题的论文（除非与情绪机制有强联系）。
   - 医学、神经科学论文，除非与情绪主题有强联系。
   - 普通的学习、教育、机器学习方法类论文。
2. 以下情况判断为相关：
   - 直接研究情绪、情感、心境、文化、社会认知、人际关系、情绪表达/感知的论文。
   - 心理学其他子领域的论文，仅当它与情绪有强联系，或非常有趣（能立刻吸引任何心理学学生注意）时才保留。
   - 符合上述 AI 标签定义的论文。
3. 判断时优先考虑论文的核心主题，而非边缘提及。

输出格式：
- 如果不相关，只输出一个字符：0
- 如果相关：
  - 第一行输出分类标签，格式为 "CATEGORY: 标签1, 标签2"（只选真正符合论文核心主题的标签）。
   - 如果论文满足以下任一条件（每期通常2-4篇），第二行输出 "RECOMMENDED: yes"：（1）直接研究面孔/声音/肢体情绪表达感知、情境/背景对情绪推断的影响、特定情绪类别体验、跨文化情绪差异、艺术情绪、动态/多通道情绪整合，且方法和发现有创新价值；（2）将AI/大语言模型与面孔表情、情绪表达/感知等核心主题结合研究的论文；（3）论文有引人入胜的故事线和主题，结论清晰有力，心理学领域的读者看到标题和摘要会想读全文。
  - 其余行用中文写 3-4 句总结。

总结写作要求：
- 用清晰、专业但易懂的语言，避免学术黑话和过度口语化。
- 开门见山点出论文最吸引人的核心发现或问题，让读者有兴趣继续读原文。
- 简要交代研究背景/问题、方法或样本、主要发现。
- 只基于标题和摘要，不要编造摘要中没有的信息。
- 不要输出项目符号、标题或多余解释。

标题：{title}
期刊：{journal}
作者：{authors}
关键词：{keywords}
匹配标签：{matched_keywords}
分类标签：{category}
摘要：{abstract}
"""

