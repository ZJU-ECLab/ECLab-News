name: Generate ECLab News
on:
  schedule:
    - cron: "0 2 * * 2" # Tuesday 02:00 UTC (10:00 UTC+8)
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      start:
        description: "Start date YYYY-MM-DD (blank = past week)"
        required: false
      end:
        description: "End date YYYY-MM-DD (blank = past week)"
        required: false
permissions:
  contents: write
env:
  CLOUDBASE_ENV_ID: eclab-progress-d9gm1x6ro276d951a
  JOURNAL_DATA_PREFIX: journal/v1
  JOURNAL_DATA_BASE: https://6563-eclab-progress-d9gm1x6ro276d951a-1341393791.tcb.qcloud.la/journal/v1
concurrency:
  group: eclab-news-publish
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install package
        run: uv pip install --system -e .
      - name: Resolve date range
        id: dates
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_START: ${{ inputs.start }}
          INPUT_END: ${{ inputs.end }}
        run: |
          START=""
          END=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            START=$(echo "$RELEASE_BODY" | grep -oP '(?<=start:\s)\d{4}-\d{2}-\d{2}' | head -1)
            END=$(echo "$RELEASE_BODY"   | grep -oP '(?<=end:\s)\d{4}-\d{2}-\d{2}'   | head -1)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            START="$INPUT_START"
            END="$INPUT_END"
          fi
          # Default: Monday to Sunday of the previous week
          if [[ -z "$START" || -z "$END" ]]; then
            START=$(date -u -d "last monday -7 days" +%Y-%m-%d)
            END=$(date -u -d "last monday -1 day" +%Y-%m-%d)
          fi
          {
            echo "start=$START"
            echo "end=$END"
            echo "label=${START}_${END}"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve release tag
        if: github.event_name != 'release'
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="${{ steps.dates.outputs.label }}"
          BASE_TAG="v${LABEL}"
          # Check if the base tag already exists
          if ! gh release view "$BASE_TAG" --json tagName >/dev/null 2>&1; then
            echo "tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
            echo "Release tag $BASE_TAG is available."
          else
            SUFFIX=1
            while gh release view "${BASE_TAG}_${SUFFIX}" --json tagName >/dev/null 2>&1; do
              (( SUFFIX++ ))
            done
            FINAL_TAG="${BASE_TAG}_${SUFFIX}"
            echo "tag=$FINAL_TAG" >> "$GITHUB_OUTPUT"
            echo "suffix=_${SUFFIX}" >> "$GITHUB_OUTPUT"
            echo "Release tag $BASE_TAG already exists; using $FINAL_TAG."
          fi
      - name: Run full pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
        run: |
          eclab-news all \
            --config config.toml \
            --start "${{ steps.dates.outputs.start }}" \
            --end   "${{ steps.dates.outputs.end }}" \
            --output-dir .
      - name: Authenticate CloudBase
        env:
          CLOUDBASE_API_KEY: ${{ secrets.CLOUDBASE_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$CLOUDBASE_API_KEY" ]]; then
            echo "::error::CLOUDBASE_API_KEY is not configured."
            exit 1
          fi

          # GitHub secrets should contain only the raw server API Key. Be
          # forgiving of a pasted Bearer prefix or trailing line break.
          CLOUDBASE_API_KEY="${CLOUDBASE_API_KEY//$'\r'/}"
          CLOUDBASE_API_KEY="${CLOUDBASE_API_KEY//$'\n'/}"
          CLOUDBASE_API_KEY="${CLOUDBASE_API_KEY#Bearer }"
          export CLOUDBASE_API_KEY

          # The CLI otherwise replaces the useful exchange error with a generic
          # login failure. Validate the same endpoint without printing secrets.
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          env_id = os.environ["CLOUDBASE_ENV_ID"]
          api_key = os.environ["CLOUDBASE_API_KEY"]
          url = f"https://{env_id}.ap-shanghai.tcb-api.tencentcloudapi.com/capi/credential"
          request = urllib.request.Request(
              url,
              data=json.dumps({"env": env_id}).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  payload = json.load(response)
          except Exception as exc:
              print(f"::error::Could not reach the CloudBase API-key endpoint: {exc}")
              raise SystemExit(1)

          if payload.get("code") not in (0, "0"):
              code = payload.get("code", "UNKNOWN")
              message = payload.get("message") or payload.get("msg") or "Unknown error"
              print(f"::error::CloudBase server API-key exchange failed ({code}): {message}")
              raise SystemExit(1)
          data = payload.get("data") or {}
          required = ("TmpSecretId", "TmpSecretKey", "Token")
          if any(not data.get(field) for field in required):
              print("::error::CloudBase returned incomplete temporary credentials.")
              raise SystemExit(1)
          print("CloudBase server API-key exchange succeeded.")
          PY

          npx --yes @cloudbase/cli@3.5.9 login \
            --cloudbase-api-key "$CLOUDBASE_API_KEY" \
            --env-id "$CLOUDBASE_ENV_ID" \
            --region ap-shanghai

      - name: Publish issue to CloudBase
        id: publish
        run: |
          set -euo pipefail
          LABEL="${{ steps.dates.outputs.label }}"
          ISSUE_JSON="site/issues/${LABEL}.json"
          if [[ ! -f "$ISSUE_JSON" ]]; then
            echo "::error::No issue JSON produced at $ISSUE_JSON."
            exit 1
          fi

          mkdir -p cloud-journal
          npx --yes @cloudbase/cli@3.5.9 storage download \
            "$JOURNAL_DATA_PREFIX/manifest.json" \
            cloud-journal/manifest.json \
            --env-id "$CLOUDBASE_ENV_ID"
          UPDATE_OUTPUT=$(eclab-news manifest-update \
            --config config.toml \
            --issue "$ISSUE_JSON" \
            --manifest cloud-journal/manifest.json)
          echo "$UPDATE_OUTPUT"
          if [[ "$UPDATE_OUTPUT" == Added* ]]; then
            IS_NEW=true
          else
            IS_NEW=false
          fi

          # Upload the issue first; the manifest is the atomic publication pointer.
          npx --yes @cloudbase/cli@3.5.9 storage upload \
            "$ISSUE_JSON" "$JOURNAL_DATA_PREFIX/issues/${LABEL}.json" \
            --env-id "$CLOUDBASE_ENV_ID" --times 3
          npx --yes @cloudbase/cli@3.5.9 storage upload \
            cloud-journal/manifest.json "$JOURNAL_DATA_PREFIX/manifest.json" \
            --env-id "$CLOUDBASE_ENV_ID" --times 3

          # Announcements are gated on the actual production URLs, not merely
          # successful upload commands.
          READY=false
          for ATTEMPT in $(seq 1 12); do
            CACHE_BUSTER="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${ATTEMPT}"
            if curl --fail --silent --show-error --retry 2 \
                 "https://emotion.is-cool.dev/journal/" >/dev/null && \
               curl --fail --silent --show-error --retry 2 \
                 "https://emotion.is-cool.dev/assets/app.js?publish=${CACHE_BUSTER}" \
                 --output "$RUNNER_TEMP/live-app.js" && \
               grep --fixed-strings --quiet \
                 "$JOURNAL_DATA_BASE/" "$RUNNER_TEMP/live-app.js" && \
               curl --fail --silent --show-error --retry 2 \
                 -H "Cache-Control: no-cache" \
                 "$JOURNAL_DATA_BASE/issues/${LABEL}.json?publish=${CACHE_BUSTER}" \
                 --output "$RUNNER_TEMP/live-issue.json" && \
               curl --fail --silent --show-error --retry 2 \
                 -H "Cache-Control: no-cache" \
                 "$JOURNAL_DATA_BASE/manifest.json?publish=${CACHE_BUSTER}" \
                 --output "$RUNNER_TEMP/live-manifest.json"; then
              if python3 - "$RUNNER_TEMP/live-issue.json" \
                "$RUNNER_TEMP/live-manifest.json" "$LABEL" <<'PY'
          import json
          import sys

          issue_path, manifest_path, expected_label = sys.argv[1:]
          with open(issue_path, encoding="utf-8") as f:
              issue = json.load(f)
          with open(manifest_path, encoding="utf-8") as f:
              manifest = json.load(f)
          if issue.get("label") != expected_label:
              raise SystemExit(1)
          labels = {entry.get("label") for entry in manifest.get("issues", [])}
          if expected_label not in labels:
              raise SystemExit(1)
          PY
              then
                READY=true
                break
              fi
            fi
            echo "Publication is not visible yet (attempt $ATTEMPT/12)."
            sleep 10
          done
          if [[ "$READY" != "true" ]]; then
            echo "::error::Issue did not become publicly readable after publication."
            exit 1
          fi

          echo "is_new=$IS_NEW" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
      - name: Upload release assets and publish
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            reports/*_wechat.md \
            site/issues/*.json \
            cloud-journal/manifest.json \
            --clobber
          gh release edit "$TAG" --draft=false
      - name: Create release (schedule/dispatch)
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          LABEL="${{ steps.dates.outputs.label }}"
          gh release create "$TAG" \
            --title "ECLab News ${LABEL//_/-}" \
            --generate-notes \
            reports/*_wechat.md \
            site/issues/*.json \
            cloud-journal/manifest.json \
            data/*.csv
      - name: Upload wechat markdown
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: eclab-news-wechat-${{ steps.dates.outputs.label }}
          path: reports/*_wechat.md
      - name: Upload full archive
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: eclab-news-full-${{ steps.dates.outputs.label }}
          path: |
            reports/*_wechat.md
            data/*.csv
            site/issues/*.json
            cloud-journal/manifest.json
      - name: Announce newly published issue
        if: steps.publish.outputs.is_new == 'true'
        env:
          SITE_DEPLOY_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
          LABEL: ${{ steps.publish.outputs.label }}
        run: |
          set -euo pipefail
          if [[ -z "$SITE_DEPLOY_TOKEN" ]]; then
            echo "::error::SITE_DEPLOY_TOKEN is required to dispatch the announcement."
            exit 1
          fi
          PAYLOAD=$(jq -n \
            --arg event_type "journal_issue_published" \
            --arg label "$LABEL" \
            '{event_type: $event_type, client_payload: {label: $label}}')
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $SITE_DEPLOY_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ZJU-ECLab/ZJU-ECLab.github.io/dispatches \
            --data "$PAYLOAD"
