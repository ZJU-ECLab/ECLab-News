name: Generate ECLab News

on:
  schedule:
    - cron: "0 18 * * 1"  # Monday 18:00 UTC (~02:00 Tue CST)
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      start:
        description: "Start date YYYY-MM-DD (blank = past week)"
        required: false
      end:
        description: "End date YYYY-MM-DD (blank = past week)"
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Install pandoc
        run: sudo apt-get update -qq && sudo apt-get install -y pandoc

      - name: Install package
        run: pip install -e .

      - name: Resolve date range
        id: dates
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_START: ${{ inputs.start }}
          INPUT_END: ${{ inputs.end }}
        run: |
          START=""
          END=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            START=$(echo "$RELEASE_BODY" | grep -oP '(?<=start:\s)\d{4}-\d{2}-\d{2}' | head -1)
            END=$(echo "$RELEASE_BODY"   | grep -oP '(?<=end:\s)\d{4}-\d{2}-\d{2}'   | head -1)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            START="$INPUT_START"
            END="$INPUT_END"
          fi
          # Default: Monday to Sunday of the previous week
          if [[ -z "$START" || -z "$END" ]]; then
            START=$(date -u -d "last monday -7 days" +%Y-%m-%d)
            END=$(date -u -d "last monday -1 day" +%Y-%m-%d)
          fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END"     >> "$GITHUB_OUTPUT"
          echo "label=${START}_${END}" >> "$GITHUB_OUTPUT"

      - name: Run full pipeline
        env:
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE:   ${{ secrets.LLM_API_BASE }}
          LLM_MODEL:      ${{ secrets.LLM_MODEL }}
          NCBI_API_KEY:   ${{ secrets.NCBI_API_KEY }}
          S2_API_KEY:     ${{ secrets.S2_API_KEY }}
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
        run: |
          eclab-news all \
            --config config.toml \
            --start "${{ steps.dates.outputs.start }}" \
            --end   "${{ steps.dates.outputs.end }}" \
            --output-dir .

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            reports/*_wechat.md \
            reports/*_lab.md \
            reports/*_lab.html \
            --clobber

      - name: Upload artifacts
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: eclab-news-${{ steps.dates.outputs.label }}
          path: |
            reports/*_wechat.md
            reports/*_lab.md
            reports/*_lab.html
            data/*.csv
