name: Generate ECLab News
on:
  schedule:
    - cron: "0 2 * * 2" # Tuesday 02:00 UTC (10:00 UTC+8)
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      start:
        description: "Start date YYYY-MM-DD (blank = past week)"
        required: false
      end:
        description: "End date YYYY-MM-DD (blank = past week)"
        required: false
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install package
        run: uv pip install --system -e .
      - name: Resolve date range
        id: dates
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_START: ${{ inputs.start }}
          INPUT_END: ${{ inputs.end }}
        run: |
          START=""
          END=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            START=$(echo "$RELEASE_BODY" | grep -oP '(?<=start:\s)\d{4}-\d{2}-\d{2}' | head -1)
            END=$(echo "$RELEASE_BODY"   | grep -oP '(?<=end:\s)\d{4}-\d{2}-\d{2}'   | head -1)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            START="$INPUT_START"
            END="$INPUT_END"
          fi
          # Default: Monday to Sunday of the previous week
          if [[ -z "$START" || -z "$END" ]]; then
            START=$(date -u -d "last monday -7 days" +%Y-%m-%d)
            END=$(date -u -d "last monday -1 day" +%Y-%m-%d)
          fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END"     >> "$GITHUB_OUTPUT"
          echo "label=${START}_${END}" >> "$GITHUB_OUTPUT"
      - name: Resolve release tag
        if: github.event_name != 'release'
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="${{ steps.dates.outputs.label }}"
          BASE_TAG="v${LABEL}"
          # Check if the base tag already exists
          if ! gh release view "$BASE_TAG" --json tagName >/dev/null 2>&1; then
            echo "tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
            echo "Release tag $BASE_TAG is available."
          else
            SUFFIX=1
            while gh release view "${BASE_TAG}_${SUFFIX}" --json tagName >/dev/null 2>&1; do
              (( SUFFIX++ ))
            done
            FINAL_TAG="${BASE_TAG}_${SUFFIX}"
            echo "tag=$FINAL_TAG" >> "$GITHUB_OUTPUT"
            echo "suffix=_${SUFFIX}" >> "$GITHUB_OUTPUT"
            echo "Release tag $BASE_TAG already exists; using $FINAL_TAG."
          fi
      - name: Run full pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
        run: |
          eclab-news all \
            --config config.toml \
            --start "${{ steps.dates.outputs.start }}" \
            --end   "${{ steps.dates.outputs.end }}" \
            --output-dir .
      - name: Publish issue to website repo
        env:
          SITE_DEPLOY_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          LABEL="${{ steps.dates.outputs.label }}"
          ISSUE_JSON="site/issues/${LABEL}.json"
          if [[ ! -f "$ISSUE_JSON" ]]; then
            echo "No issue JSON produced at $ISSUE_JSON; skipping site publish."
            exit 0
          fi
          if [[ -z "$SITE_DEPLOY_TOKEN" ]]; then
            echo "SITE_DEPLOY_TOKEN not set; skipping site publish."
            exit 0
          fi
          git clone --depth 1 \
            "https://x-access-token:${SITE_DEPLOY_TOKEN}@github.com/ZJU-ECLab/ZJU-ECLab.github.io.git" \
            site-repo
          mkdir -p site-repo/data/issues
          cp "$ISSUE_JSON" "site-repo/data/issues/${LABEL}.json"
          # Rebuild the manifest from all issue files now present in the site repo
          eclab-news manifest \
            --config config.toml \
            --issues-dir site-repo/data/issues \
            --output site-repo/data/manifest.json
          cd site-repo
          git config user.name "eclab-news-bot"
          git config user.email "eclab-news-bot@users.noreply.github.com"
          git add data/issues/"${LABEL}".json data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Publish issue ${LABEL//_/ – }"
            git push
          fi
      - name: Upload release assets and publish
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" \
            reports/*_wechat.md \
            --clobber
          gh release edit "$TAG" --draft=false
      - name: Create release (schedule/dispatch)
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          LABEL="${{ steps.dates.outputs.label }}"
          gh release create "$TAG" \
            --title "ECLab News ${LABEL//_/-}" \
            --generate-notes \
            reports/*_wechat.md \
            data/*.csv
      - name: Upload wechat markdown
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: eclab-news-wechat-${{ steps.dates.outputs.label }}
          path: reports/*_wechat.md
      - name: Upload full archive
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: eclab-news-full-${{ steps.dates.outputs.label }}
          path: |
            reports/*_wechat.md
            data/*.csv
